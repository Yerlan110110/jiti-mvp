services:
  - type: web
    name: jiti-backend
    env: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20.11.0"
      - key: DATABASE_URL
        value: "jiti.db" # Путь без папки data, чтобы не было ошибки "unable to open database file"
      - key: CORS_ORIGINS
        value: "*"
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PHONE
        value: "+77001234567"
