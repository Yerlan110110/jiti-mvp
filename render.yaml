services:
  - type: web
    name: jiti-backend
    runtime: node
    region: frankfurt
    plan: free
    branch: main
    autoDeployTrigger: commit
    buildCommand: cd backend && npm ci
    startCommand: cd backend && npm start
    healthCheckPath: /api/health
    buildFilter:
      paths:
        - backend/**
        - admin/**
        - render.yaml
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: jiti-postgres
          property: connectionString
      - key: CORS_ORIGINS
        value: "*"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "30d"
      - key: ADMIN_PHONE
        value: "+77001234567"
      - key: SMS_MOCK
        value: "true"
      - key: SMS_MOCK_CODE
        value: "1234"

databases:
  - name: jiti-postgres
    databaseName: jiti
    user: jiti_user
    region: frankfurt
    plan: free
    postgresMajorVersion: "16"
