services:
  - type: web
    name: jiti-backend
    env: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: "data/jiti.db" # База будет внутри контейнера (сбрасывается при деплое)
      - key: CORS_ORIGINS
        value: "*"
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PHONE
        value: "+77001234567"
